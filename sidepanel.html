<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      color: #e0e0f0;
      font-size: 13px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 12px 16px;
      background: #12122a;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-weight: 700; color: #818cf8; }
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .placeholder {
      text-align: center;
      color: #444;
      padding: 40px 20px;
    }
    .placeholder h2 { color: #666; font-size: 15px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⬡ DevLens</span>
    <span style="color:#444; font-size: 11px;">Side Panel (Pro)</span>
  </div>
  <div class="content">
    <div class="placeholder">
      <h2>Side Panel</h2>
      <p>Coming in DevLens Pro.<br>Highlight text and press Ctrl+Shift+L for now.</p>
    </div>
  </div>
</body>
</html>
